<div id="contenido" class="animate__animated animate__fadeIn">
    <style>
        .lyrics-queue-header-compact h2 {
            display: none !important;
        }
        .lyrics-queue-header-compact .flex.flex-col.gap-4 {
            gap: 0.5rem !important;
        }
    </style>
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8">Lyrics Analysis</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-4">
        <!-- Lyrics Analysis Card -->
        <div class="bg-white/80 dark:bg-gray-900/70 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-md backdrop-blur-sm transition-all duration-200 hover:bg-white/90 dark:hover:bg-gray-900/80">
            <div class="flex items-center mb-4">
                <svg class="w-8 h-8 mr-3 text-pink-500 dark:text-pink-400" fill="currentColor" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" xml:space="preserve">
                  <title>Lyrics icon</title>
                  <g>
                    <g>
                      <g>
                        <path
                          d="M488.413,118.27c0-31.606-12.309-61.323-34.659-83.671C411.664-7.493,345.498-11.175,299.184,23.53l-7.131-7.131 L268.211,40.24l7.12,7.12c-16.405,21.844-24.698,48.595-23.458,76.141L39.935,351.283l38.815,38.815 c-18.243,21.376-21.458,35.552-24.34,48.289c-2.975,13.143-5.545,24.493-30.822,49.771L47.429,512 c32.17-32.171,36.257-50.232,39.865-66.169c2.247-9.924,4.128-18.212,15.358-31.83l34.416,34.416l227.782-211.94 c1.797,0.081,3.593,0.133,5.382,0.133c25.634,0,50.338-8.262,70.754-23.594l7.124,7.124l23.841-23.841l-7.121-7.121 C480.132,168.825,488.413,144.186,488.413,118.27z M137.911,401.577L86.773,350.44l182.909-196.581l64.81,64.811L137.911,401.577 z M366.302,202.793l-80.745-80.745c-0.818-18.069,4.097-35.659,13.96-50.502l117.286,117.287 C401.963,198.697,384.374,203.609,366.302,202.793z M440.649,164.995L323.369,47.714c32.839-21.755,77.634-18.184,106.543,10.725 c15.982,15.982,24.783,37.231,24.783,59.83C454.695,135.143,449.785,151.259,440.649,164.995z">
                        </path>
                        <rect x="191.378" y="260.003" transform="matrix(-0.7071 -0.7071 0.7071 -0.7071 165.2732 622.1811)"
                          width="40.234" height="33.717"></rect>
                      </g>
                    </g>
                  </g>
                </svg>
                <h3 class="text-xl font-semibold text-slate-800 dark:text-white">Lyrics Analysis</h3>
            </div>
            <p class="text-slate-600 dark:text-slate-400 mb-4">
                Search for and add lyrics to tracks that don't have them. Choose a lyrics provider to use for all tracks.
            </p>
            <form hx-post="/analyze/lyrics" hx-target="#toast-container" hx-swap="beforeend">
                <div class="mb-4">
                    <label for="lyrics-provider" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Lyrics Provider
                    </label>
                    <select
                        id="lyrics-provider"
                        name="provider"
                        required
                        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md shadow-sm focus:outline-none focus:ring-pink-500 focus:border-pink-500 dark:bg-gray-700 dark:text-white"
                    >
                        {{range .LyricsProviders}}
                        {{if .Enabled}}
                        <option value="{{.Name}}">{{.DisplayName}}</option>
                        {{end}}
                        {{end}}
                    </select>
                </div>
                <div class="mb-4 space-y-3">
                    <div class="flex items-center">
                        <input
                            type="checkbox"
                            id="skip_existing_lyrics"
                            name="skip_existing_lyrics"
                            value="true"
                            checked
                            class="w-4 h-4 text-pink-500 border-gray-300 rounded focus:ring-pink-500 dark:border-gray-600 dark:bg-gray-700"
                            hx-on:click="this.checked ? (document.getElementById('override_no_queue').setAttribute('disabled', ''), document.getElementById('override_no_queue').classList.add('opacity-50'), document.getElementById('override_no_queue-label').classList.add('opacity-50'), document.getElementById('override_no_queue').checked = false) : (document.getElementById('override_no_queue').removeAttribute('disabled'), document.getElementById('override_no_queue').classList.remove('opacity-50'), document.getElementById('override_no_queue-label').classList.remove('opacity-50'))"
                        >
                        <label id="skip_existing_lyrics-label" for="skip_existing_lyrics" class="ml-2 text-sm text-slate-700 dark:text-slate-300">
                            Skip tracks that already have lyrics
                        </label>
                    </div>
                    <div class="flex items-center">
                        <input
                            type="checkbox"
                            id="override_no_queue"
                            name="override_no_queue"
                            value="true"
                            disabled
                            class="w-4 h-4 text-pink-500 border-gray-300 rounded focus:ring-pink-500 dark:border-gray-600 dark:bg-gray-700 opacity-50"
                            hx-on:click="this.checked ? (document.getElementById('skip_existing_lyrics').setAttribute('disabled', ''), document.getElementById('skip_existing_lyrics').classList.add('opacity-50'), document.getElementById('skip_existing_lyrics-label').classList.add('opacity-50'), document.getElementById('skip_existing_lyrics').checked = false) : (document.getElementById('skip_existing_lyrics').removeAttribute('disabled'), document.getElementById('skip_existing_lyrics').classList.remove('opacity-50'), document.getElementById('skip_existing_lyrics-label').classList.remove('opacity-50'))"
                        >
                        <label id="override_no_queue-label" for="override_no_queue" class="ml-2 text-sm text-slate-700 dark:text-slate-300 opacity-50">
                            Override without queuing
                        </label>
                    </div>
                </div>
                <button
                    type="submit"
                    class="w-full border border-pink-500 dark:border-pink-400 text-pink-500 dark:text-pink-400 hover:bg-pink-50 dark:hover:bg-pink-900/30 font-medium py-2 px-4 rounded-md transition-colors duration-200"
                >
                    Start Lyrics Analysis
                    <span class="htmx-indicator ml-2">
                        <i class="fas fa-spinner fa-spin text-pink-500 dark:text-pink-400"></i>
                    </span>
                </button>
            </form>
        </div>

        <!-- Lyrics Queue Card -->
        <div class="bg-white/80 dark:bg-gray-900/70 border border-gray-200 dark:border-gray-700 rounded-xl p-3 shadow-sm backdrop-blur-sm transition-all duration-200 hover:bg-white/90 dark:hover:bg-gray-900/80 flex flex-col">
            <div class="flex items-center mb-2">
                <i class="fas fa-microphone text-purple-500 dark:text-purple-400 text-lg mr-2"></i>
                <h3 class="text-lg font-semibold text-slate-800 dark:text-white flex items-center gap-2">
                    Lyrics Queue
                    <span
                      hx-get="/lyrics/queue/count"
                      hx-target="this"
                      hx-swap="innerHTML"
                      hx-trigger="updateLyricsQueueCount from:body"
                      class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded-full">
                      0 items
                    </span>
                </h3>
            </div>
            <div class="space-y-2 flex-grow flex flex-col min-h-0">
                <div id="lyrics-queue-header"
                     hx-get="/ui/lyrics/queue/header"
                     hx-trigger="load"
                     hx-swap="innerHTML"
                     class="w-full lyrics-queue-header-compact">
                </div>
                <div id="lyrics-queue-content"
                     hx-get="/ui/lyrics/queue/items"
                     hx-trigger="load"
                     hx-swap="innerHTML"
                     class="w-full flex-grow overflow-y-auto max-h-[250px]">
                </div>
            </div>
        </div>
    </div>

    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Lyrics Jobs</h2>

    <div id="lyrics-job-list-container"
         hx-get="/ui/jobs/list?prefix=analyze_lyrics"
         hx-trigger="load, refreshJobList from:body"
         hx-swap="innerHTML">
        <!-- Loading state -->
        <div class="text-center py-8">
            <p class="text-sm text-gray-500 dark:text-gray-400">Loading lyrics jobs...</p>
        </div>
    </div>
</div>
