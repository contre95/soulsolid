<div id="contenido" class="animate__animated animate__fadeIn">
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8">Lyrics Analysis</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-4">
        <!-- Lyrics Analysis Card -->
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-lg">
            <div class="flex items-center mb-4">
                <img src="/svg/mic.svg" class="w-8 h-8 mr-3" style="filter: invert(67%) sepia(89%) saturate(7493%) hue-rotate(286deg) brightness(101%) contrast(107%);">
                <h3 class="text-xl font-semibold text-slate-800 dark:text-white">Lyrics Analysis</h3>
            </div>
            <p class="text-slate-600 dark:text-slate-400 mb-4">
                Search for and add lyrics to tracks that don't have them. Choose a lyrics provider to use for all tracks.
            </p>
            <form hx-post="/analyze/lyrics" hx-target="#toast-container" hx-swap="beforeend">
                <div class="mb-4">
                    <label for="lyrics-provider" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Lyrics Provider
                    </label>
                    <select
                        id="lyrics-provider"
                        name="provider"
                        required
                        class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md shadow-sm focus:outline-none focus:ring-pink-500 focus:border-pink-500 dark:bg-gray-700 dark:text-white"
                    >
                        {{range .LyricsProviders}}
                        {{if .Enabled}}
                        <option value="{{.Name}}">{{.DisplayName}}</option>
                        {{end}}
                        {{end}}
                    </select>
                </div>
                <button
                    type="submit"
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white font-medium py-2 px-4 rounded-md transition-colors duration-200"
                >
                    Start Lyrics Analysis
                    <span class="htmx-indicator ml-2">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>
        </div>
    </div>

    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Lyrics Jobs</h2>

    <div id="lyrics-job-list-container"
         hx-get="/ui/jobs/list?prefix=analyze_lyrics"
         hx-trigger="load, refreshJobList from:body"
         hx-swap="innerHTML">
        <!-- Loading state -->
        <div class="text-center py-8">
            <p class="text-sm text-gray-500 dark:text-gray-400">Loading lyrics jobs...</p>
        </div>
    </div>
</div>
