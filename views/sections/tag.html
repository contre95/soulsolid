<div id="contenido" class="animate__animated animate__fadeIn">
  <div
    id="app-status"
    hx-get="/ui/jobs/active"
    hx-trigger="load, every 5s"
    hx-swap="innerHTML"
    hx-swap-oob="true"
  ></div>
  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8"
  >
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Tags</h1>
     <div class="flex flex-wrap items-center gap-3">
       <!-- Album Art thumbnail (mobile only) -->
       {{if .Track.ID}}
       <a href="/ui/tag/edit/{{.Track.ID}}/artwork" target="_blank" rel="noopener noreferrer"
          class="sm:hidden flex-shrink-0 block w-14 h-14 rounded-lg overflow-hidden border-2 border-gray-300 dark:border-gray-600 shadow-sm hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-200 cursor-zoom-in"
          onerror="this.style.display='none'">
         <img src="/ui/tag/edit/{{.Track.ID}}/artwork"
              alt="Album Art"
              class="w-full h-full object-cover"
              onerror="this.closest('a').style.display='none'">
       </a>
       {{end}}
       <!-- Metadata Providers -->
       <div hx-get="/ui/tag/buttons/metadata/{{if .Track.ID}}{{.Track.ID}}{{else}}0{{end}}"
            hx-trigger="load"
            hx-swap="innerHTML">
       </div>
       <!-- Lyrics Providers -->
       <div hx-get="/ui/tag/buttons/lyrics/{{if .Track.ID}}{{.Track.ID}}{{else}}0{{end}}"
            hx-trigger="load"
            hx-swap="innerHTML">
       </div>
     </div>
  </div>

  {{if .FetchError}}
  <div class="flex items-center gap-3 flex-wrap mb-6">
    <span
      class="group inline-flex items-center px-2 py-1 rounded-md text-xs font-medium tracking-wider transition-all duration-300 ease-out-expo hover:-translate-y-0.5 bg-gradient-to-r from-violet-500/10 to-orange-500/10 backdrop-blur-md border border-violet-400/30 border-r-orange-400/30 text-violet-600 dark:text-violet-300 dark:border-r-orange-300 shadow-lg shadow-violet-500/10 hover:shadow-violet-500/20"
    >
      <span class="flex items-center">
        <i class="fas fa-exclamation-triangle mr-2 opacity-80"></i>
        <span class="font-semibold">{{.FetchError}}</span>
      </span>
    </span>
  </div>
  {{end}}

  <!-- Tag Editing Form Container -->
  <div>{{template "tag/edit_form" .}}</div>
</div>
