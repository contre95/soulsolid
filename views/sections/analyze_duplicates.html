<div id="contenido" class="animate__animated animate__fadeIn">
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8">Duplicates Analysis</h1>

    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8">Duplicates Review</h1>
    
    <!-- Analysis Form (compact top bar) -->
    <div class="bg-white/80 dark:bg-gray-900/70 border border-gray-200 dark:border-gray-700 rounded-2xl p-4 mb-8 shadow-sm">
        <form hx-post="/analyze/duplicates" hx-target="#toast-container" hx-swap="beforeend" class="flex gap-4 items-end">
            <div class="flex-1 grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Exact</label>
                    <input type="number" name="fp_exact_thresh" value="0.95" step="0.01" min="0.5" max="1.0" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-xl dark:bg-gray-700 dark:text-white text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Fuzzy</label>
                    <input type="number" name="fp_fuzzy_thresh" value="0.75" step="0.01" min="0.5" max="1.0" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-xl dark:bg-gray-700 dark:text-white text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Action</label>
                    <select name="default_action" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-xl dark:bg-gray-700 dark:text-white text-sm">
                        <option value="queue" selected>Queue</option>
                        <option value="keep">Keep</option>
                        <option value="delete">Delete</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="px-8 py-2 border border-orange-500 dark:border-orange-400 text-orange-500 dark:text-orange-400 hover:bg-orange-50 dark:hover:bg-orange-900/30 font-medium rounded-xl text-sm transition-colors">
                Analyze
                <span class="htmx-indicator ml-2">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </form>
    </div>

    <!-- Full Content Queue Review -->
    <div id="duplicates-queue-header"
         hx-get="/ui/duplicates/queue/header"
         hx-trigger="load"
         hx-swap="innerHTML"
         class="mb-4">
    </div>
    <div id="duplicates-queue-content"
         hx-get="/ui/duplicates/queue/items"
         hx-trigger="load, duplicatesQueueUpdated from:body"
         hx-swap="innerHTML"
         class="w-full">
    </div>

    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Duplicates Jobs</h2>

    <div id="duplicates-job-list-container"
         hx-get="/ui/jobs/list?prefix=analyze_duplicates"
         hx-trigger="load, refreshJobList from:body"
         hx-swap="innerHTML">
        <!-- Loading state -->
        <div class="text-center py-8">
            <p class="text-sm text-gray-500 dark:text-gray-400">Loading duplicates jobs...</p>
        </div>
    </div>
</div>
