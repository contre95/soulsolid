<div id="contenido" class="animate__animated animate__fadeIn pb-40 sm:pb-32">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Music Library</h1>
    <div class="flex items-center gap-3">
      <button hx-get="/library" hx-swap="outerHTML" hx-target="#contenido" title="Refresh Library View"
        class="cursor-pointer group inline-flex items-center px-3 py-2 rounded-md text-sm font-medium tracking-wider transition-all duration-300 ease-out-expo hover:-translate-y-0.5 bg-green-500/10 backdrop-blur-md border border-green-400/30 text-green-600 dark:text-green-300 shadow-lg shadow-green-500/10 hover:shadow-green-500/20">
        <span class="flex items-center">
          <i class="fas fa-refresh mr-2 opacity-80"></i>
          <i class="fas fa-music opacity-80"></i>
        </span>
      </button>
      <button hx-post="/import/directory" hx-vals='{"directoryPath": "{{.DefaultDownloadPath}}"}'
        hx-target="#toast-container" hx-swap="innerHTML" title="Import from Downloads Folder"
        class="cursor-pointer group inline-flex items-center px-3 py-2 rounded-md text-sm font-medium tracking-wider transition-all duration-300 ease-out-expo hover:-translate-y-0.5 bg-blue-500/10 backdrop-blur-md border border-blue-400/30 text-blue-600 dark:text-blue-300 shadow-lg shadow-blue-500/10 hover:shadow-blue-500/20">
        <span class="flex items-center">
          <i class="fas fa-download mr-2 opacity-80"></i>
          <i class="fas fa-arrow-right mr-2 opacity-60"></i>
          <i class="fas fa-database opacity-80"></i>
        </span>
      </button>
      <a href="/library/tree?folder=downloads" target="_blank" title="Open Downloads Folder Tree"
        class="cursor-pointer group inline-flex items-center px-3 py-2 rounded-md text-sm font-medium tracking-wider transition-all duration-300 ease-out-expo hover:-translate-y-0.5 bg-purple-500/10 backdrop-blur-md border border-purple-400/30 text-purple-600 dark:text-purple-300 shadow-lg shadow-purple-500/10 hover:shadow-purple-500/20">
        <span class="flex items-center">
          <i class="fas fa-folder-tree mr-2 opacity-80"></i>
          <i class="fas fa-download opacity-80"></i>
        </span>
      </a>
      <a href="/library/tree" target="_blank" title="Open Library Folder Tree"
        class="cursor-pointer group inline-flex items-center px-3 py-2 rounded-md text-sm font-medium tracking-wider transition-all duration-300 ease-out-expo hover:-translate-y-0.5 bg-orange-500/10 backdrop-blur-md border border-orange-400/30 text-orange-600 dark:text-orange-300 shadow-lg shadow-orange-500/10 hover:shadow-orange-500/20">
        <span class="flex items-center">
          <i class="fas fa-folder-tree mr-2 opacity-80"></i>
          <i class="fas fa-music opacity-80"></i>
        </span>
      </a>
    </div>
  </div>

  <!-- Library Table Section - Loaded from UI library feature -->
  <div hx-get="/library/table" hx-trigger="load" hx-swap="outerHTML">
    <!-- Loading state -->
    <div>
      <div class="border-b border-slate-200 dark:border-slate-700">
        <nav class="flex -mb-px">
          <div class="py-4 px-6 text-sm font-medium border-b-2 border-transparent text-slate-500">
            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-16 animate-pulse"></div>
          </div>
          <div class="py-4 px-6 text-sm font-medium border-b-2 border-transparent text-slate-500">
            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-16 animate-pulse"></div>
          </div>
          <div class="py-4 px-6 text-sm font-medium border-b-2 border-transparent text-slate-500">
            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-16 animate-pulse"></div>
          </div>
        </nav>
      </div>
      <div class="p-6">
        <div class="animate-pulse">
          <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
          <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
          <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mini player bar (shows when a track is clicked) -->
  <div id="player-bar"
       class="hidden fixed bottom-0 inset-x-0 sm:left-64 z-40 border-t border-white/40 dark:border-white/10 bg-white/20 dark:bg-neutral-900/25 backdrop-blur-2xl shadow-[0_-6px_30px_rgba(142,197,255,0.18)]">
    <div class="w-full px-3 sm:px-6 py-2.5">
      <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-3 sm:gap-4">
        <!-- Col 1: artwork + title -->
        <div class="flex items-center gap-3 min-w-0">
          <div class="relative flex-shrink-0 w-12 h-12 sm:w-14 sm:h-14 rounded-xl overflow-hidden bg-gradient-to-br from-sky-400 to-indigo-600 shadow-lg">
            <img id="player-art" src="" alt="" class="w-full h-full object-cover" _="on error set my style.display to 'none'">
          </div>
          <div class="flex items-center gap-2 min-w-0">
            <div class="min-w-0">
              <p id="player-title" class="truncate text-sm font-semibold text-gray-900 dark:text-white">Nothing playing</p>
              <p id="player-artist" class="truncate text-xs text-gray-500 dark:text-gray-400">Pick a track to start</p>
            </div>
            <div id="player-eq" class="player-eq hidden sm:flex" aria-hidden="true">
              <span style="--d:0s"></span><span style="--d:.25s"></span><span style="--d:.45s"></span><span style="--d:.1s"></span>
            </div>
          </div>
        </div>

        <!-- Col 2: controls -->
        <div class="flex items-center justify-center gap-1.5 sm:gap-3">
          <button type="button" title="Previous" _="on click call playerStep(-1)"
                  class="w-9 h-9 flex items-center justify-center rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
            <i class="fas fa-backward-step"></i>
          </button>
          <button type="button" id="player-toggle" title="Play / Pause" _="on click call playerToggle()"
                  class="w-11 h-11 flex items-center justify-center rounded-full bg-[#8EC5FF] hover:bg-[#7ab6f5] text-slate-900 shadow-lg shadow-[#8EC5FF]/40 transition-colors">
            <i id="player-icon" class="fas fa-play"></i>
          </button>
          <button type="button" title="Next" _="on click call playerStep(1)"
                  class="w-9 h-9 flex items-center justify-center rounded-full text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
            <i class="fas fa-forward-step"></i>
          </button>
        </div>

        <!-- Col 3: volume -->
        <div class="flex items-center justify-end gap-2">
          <i class="fas fa-volume-high text-gray-400 text-xs"></i>
          <input type="range" min="0" max="100" value="100"
                 _="on input set #player-audio.volume to (my value / 100)"
                 class="w-14 sm:w-20 lg:w-28 h-1 accent-[#8EC5FF] cursor-pointer">
        </div>
      </div>

      <!-- Progress -->
      <div class="flex items-center gap-2 mt-2">
        <span id="player-current" class="text-[11px] text-gray-500 dark:text-gray-400 tabular-nums w-9 text-right">0:00</span>
        <input id="player-seek" type="range" min="0" max="100" value="0" step="0.1"
               _="on input if #player-audio.duration set #player-audio.currentTime to (my value / 100) * #player-audio.duration end"
               class="flex-1 h-1 accent-[#8EC5FF] cursor-pointer">
        <span id="player-duration" class="text-[11px] text-gray-500 dark:text-gray-400 tabular-nums w-9">0:00</span>
      </div>

      <audio id="player-audio" preload="none"
             _="on play set #player-icon.className to 'fas fa-pause' then add .is-active to #player-eq
                on pause set #player-icon.className to 'fas fa-play' then remove .is-active from #player-eq
                on timeupdate or loadedmetadata
                  if my duration set #player-seek.value to (my currentTime / my duration) * 100 end
                  put fmtTime(my currentTime) into #player-current
                  put fmtTime(my duration) into #player-duration
                on ended call playerStep(1)"></audio>
    </div>
  </div>
</div>

<style>
  .player-eq { align-items: flex-end; gap: 2px; height: 18px; }
  .player-eq span {
    width: 3px; height: 4px; border-radius: 2px;
    background: linear-gradient(180deg, #8EC5FF, #5b9bd5);
  }
  .player-eq.is-active span {
    animation: playerEqBounce 0.9s ease-in-out infinite;
    animation-delay: var(--d);
  }
  @keyframes playerEqBounce { 0%, 100% { height: 4px; } 50% { height: 16px; } }

  .player-track-row.is-playing { background: rgba(142, 197, 255, 0.14); }
  .player-track-row.is-playing .block:first-child { color: #2563eb; }
  .dark .player-track-row.is-playing .block:first-child { color: #8EC5FF; }
  .player-track-row.is-playing .player-row-icon { opacity: 1; }
</style>
