{{define "scripts"}}
<script>
  function toggleDarkMode() {
    console.log("toggleDarkMode called");
    document.documentElement.classList.toggle("dark");
    // Optional: Persist the theme preference
    if (document.documentElement.classList.contains("dark")) {
      localStorage.theme = "dark";
      console.log("Switched to dark mode");
    } else {
      localStorage.theme = "light";
      console.log("Switched to light mode");
    }
  }
  if (
    localStorage.theme === "dark" ||
    (!("theme" in localStorage) &&
      window.matchMedia("(prefers-color-scheme: dark)").matches)
  ) {
    document.documentElement.classList.add("dark");
    console.log("Initial dark mode applied");
  } else {
    document.documentElement.classList.remove("dark");
    console.log("Initial light mode applied");
  }

  // SlimSelect initialization for tag edit form
  function initSlimSelect() {
    // Destroy existing instances
    if (window.albumSelect) window.albumSelect.destroy();
    if (window.albumArtistSelect) window.albumArtistSelect.destroy();
    if (window.artistSelect) window.artistSelect.destroy();

    // Initialize new instances
    if (document.getElementById("album")) {
      window.albumSelect = new SlimSelect({
        select: "#album",
      });
    }
    if (document.getElementById("album_artist")) {
      window.albumArtistSelect = new SlimSelect({
        select: "#album_artist",
      });
    }
    if (document.getElementById("artist")) {
      window.artistSelect = new SlimSelect({
        select: "#artist",
      });
    }
  }

  // Override HTMX confirm to use SweetAlert2
  document.addEventListener("htmx:confirm", function(e) {
    if (!e.detail.question) return;
    e.preventDefault();
    Swal.fire({
      title: "Are you sure?",
      text: e.detail.question,
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Confirm",
      cancelButtonText: "Cancel",
      buttonsStyling: false,
      customClass: {
        popup: "swal2-ss-popup",
        title: "swal2-ss-title",
        htmlContainer: "swal2-ss-text",
        icon: "swal2-ss-icon",
        confirmButton: "swal2-ss-confirm",
        cancelButton: "swal2-ss-cancel",
        actions: "swal2-ss-actions",
      },
    }).then(function(result) {
      if (result.isConfirmed) e.detail.issueRequest(true);
    });
  });

  // Initialize on page load
  document.addEventListener("DOMContentLoaded", initSlimSelect);

  // Re-initialize after HTMX swaps, but only for the main content area
  document.addEventListener("htmx:afterSettle", function (event) {
    // Re-process HTMX on queue content and main area for dynamic buttons
    if (event.target) {
      if (event.target.id === "contenido" || event.target.id === "lyrics-queue-content" || event.target.id === "queue-content") {
        htmx.process(event.target);
      }
      if (event.target.id === "contenido") {
        initSlimSelect();
      }
    }
  });

  // Queue grouping button activation
  function activateGroupingButton(groupingType) {
    // Remove active state from all buttons
    document.querySelectorAll('.view-toggle-btn').forEach(btn => {
      btn.classList.remove('active', 'bg-white', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300', 'shadow-sm');
      btn.classList.add('text-gray-600', 'dark:text-gray-400');
    });

    // Add active state to target button
    const targetBtn = document.getElementById(`view-${groupingType}`);
    if (targetBtn) {
      targetBtn.classList.add('active', 'bg-white', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300', 'shadow-sm');
      targetBtn.classList.remove('text-gray-600', 'dark:text-gray-400');
    }
  }

  // Show an error toast programmatically (mirrors toast/toastErr.html)
  function showErrToast(msg) {
    var existing = document.getElementById('toastErr');
    if (existing) existing.remove();
    var el = document.createElement('div');
    el.id = 'toastErr';
    el.className = 'fixed top-5 right-5 z-50 p-4 rounded-lg shadow-lg border backdrop-blur-sm max-w-sm bg-red-50/90 dark:bg-red-900/80 border-red-200 dark:border-red-700 text-red-800 dark:text-red-200 animate__animated animate__bounceInRight';
    var row = document.createElement('div');
    row.className = 'flex items-center';
    var iconWrap = document.createElement('div');
    iconWrap.className = 'flex-shrink-0';
    iconWrap.innerHTML = '<svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>';
    var msgWrap = document.createElement('div');
    msgWrap.className = 'ml-3';
    var p = document.createElement('p');
    p.className = 'text-sm font-medium';
    p.textContent = msg;
    msgWrap.appendChild(p);
    var closeWrap = document.createElement('div');
    closeWrap.className = 'ml-auto pl-3';
    var btn = document.createElement('button');
    btn.className = 'inline-flex rounded-md p-1.5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors';
    btn.innerHTML = '<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
    btn.onclick = function() { el.remove(); };
    closeWrap.appendChild(btn);
    row.appendChild(iconWrap);
    row.appendChild(msgWrap);
    row.appendChild(closeWrap);
    el.appendChild(row);
    document.getElementById('toast-container').appendChild(el);
  }

  // Audio player controls
  function toggleAudioPlayer(playBtn) {
    var player = playBtn.closest('.audio-player');
    var audio = player.querySelector('audio');
    var icon = playBtn.querySelector('i');
    if (audio.paused) {
      document.querySelectorAll('.audio-player audio').forEach(function(a) {
        if (a !== audio && !a.paused) {
          a.pause();
          var p = a.closest('.audio-player');
          if (p) {
            var bi = p.querySelector('.play-btn i');
            if (bi) bi.className = 'fas fa-play fa-xs';
          }
        }
      });
      audio.play();
      icon.className = 'fas fa-pause fa-xs';
    } else {
      audio.pause();
      icon.className = 'fas fa-play fa-xs';
    }
  }

  function updateAudioProgress(audio) {
    if (!audio.duration) return;
    var player = audio.closest('.audio-player');
    if (!player) return;
    var range = player.querySelector('input[type=range]');
    if (range) range.value = (audio.currentTime / audio.duration) * 100;
    var timeEl = player.querySelector('.time-display');
    if (timeEl) {
      var s = Math.floor(audio.currentTime);
      timeEl.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
  }

  function seekAudioProgress(rangeEl) {
    var player = rangeEl.closest('.audio-player');
    var audio = player.querySelector('audio');
    if (audio.duration) audio.currentTime = (rangeEl.value / 100) * audio.duration;
  }

  function resetAudioPlayer(audio) {
    var player = audio.closest('.audio-player');
    if (!player) return;
    var bi = player.querySelector('.play-btn i');
    if (bi) bi.className = 'fas fa-play fa-xs';
    var range = player.querySelector('input[type=range]');
    if (range) range.value = 0;
    var timeEl = player.querySelector('.time-display');
    if (timeEl) timeEl.textContent = '0:00';
  }

  // Lyrics-specific grouping (matches queue_header.html IDs)
  function activateLyricsGroupingButton(groupingType) {
    const idMap = {
      'individual': 'view-individual-lyrics',
      'artist-groups': 'view-artist-groups-lyrics',
      'album-groups': 'view-album-groups-lyrics'
    };
    const id = idMap[groupingType];
    if (!id) return activateGroupingButton(groupingType); // fallback

    // Remove active state from all buttons
    document.querySelectorAll('.view-toggle-btn').forEach(btn => {
      btn.classList.remove('active', 'bg-white', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300', 'shadow-sm');
      btn.classList.add('text-gray-600', 'dark:text-gray-400');
    });

    const targetBtn = document.getElementById(id);
    if (targetBtn) {
      targetBtn.classList.add('active', 'bg-white', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300', 'shadow-sm');
      targetBtn.classList.remove('text-gray-600', 'dark:text-gray-400');
    }
  }
</script>
{{end}}
