<div class="flex flex-col gap-2">
  <!-- Main header row - compact -->
  <div class="flex items-center justify-between gap-2">
     <div class="flex flex-row gap-1">
       <button
         hx-get="/ui/lyrics/queue/items"
         hx-target="#lyrics-queue-content"
         hx-swap="innerHTML"
         hx-trigger="click, lyricsQueueUpdated from:body, refreshLyricsQueueBadge from:body"
         class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-purple-500/10 border border-purple-400/30 text-purple-600 dark:text-purple-300 hover:bg-purple-500/20 dark:hover:bg-purple-500/30"
         title="Refresh Queue">
         <i class="fas fa-sync-alt"></i>
       </button>
       <button
         hx-post="/lyrics/queue/clear"
         hx-target="#toast-container"
         hx-trigger="click"
         hx-confirm="Are you sure you want to clear the entire queue?"
         class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-red-100/80 dark:bg-red-900/30 border border-red-200/50 dark:border-red-700/50 text-red-800 dark:text-red-200 hover:bg-red-200/80 dark:hover:bg-red-800/30"
         title="Clear Queue">
         <i class="fas fa-trash-alt"></i>
       </button>
     </div>
  </div>

  <!-- View toggle buttons row - compact -->
  <div class="flex justify-center">
     <div class="flex gap-1 bg-gray-100/50 dark:bg-gray-800/50 rounded p-0.5">
        <button
          id="view-individual-lyrics"
          hx-get="/ui/lyrics/queue/items"
          hx-target="#lyrics-queue-content"
          hx-swap="innerHTML"
          hx-trigger="click, activateIndividualGroupingLyrics from:body, lyricsQueueUpdated from:body, refreshLyricsQueueBadge from:body"
          hx-on:click="activateLyricsGroupingButton('individual');"
          hx-on:htmx:after-request="if (event.detail.xhr.getResponseHeader('HX-Trigger')?.includes('activateIndividualGroupingLyrics')) { activateLyricsGroupingButton('individual'); }"
          class="view-toggle-btn active inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300"
          title="Individual View">
          <i class="fas fa-list text-xs"></i>
        </button>
        <button
          id="view-artist-groups-lyrics"
          hx-get="/ui/lyrics/queue/items/grouped?type=artist"
          hx-target="#lyrics-queue-content"
          hx-swap="innerHTML"
          hx-trigger="click, activateArtistGroupingLyrics from:body, lyricsQueueUpdated from:body, refreshLyricsQueueBadge from:body"
          hx-on:click="activateLyricsGroupingButton('artist-groups');"
          hx-on:htmx:after-request="if (event.detail.xhr.getResponseHeader('HX-Trigger')?.includes('activateArtistGroupingLyrics')) { activateLyricsGroupingButton('artist-groups'); }"
          class="view-toggle-btn inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-700 hover:text-gray-800 dark:hover:text-gray-200"
          title="Group by Artist">
          <i class="fas fa-user text-xs"></i>
        </button>
        <button
          id="view-album-groups-lyrics"
          hx-get="/ui/lyrics/queue/items/grouped?type=album"
          hx-target="#lyrics-queue-content"
          hx-swap="innerHTML"
          hx-trigger="click, activateAlbumGroupingLyrics from:body, lyricsQueueUpdated from:body, refreshLyricsQueueBadge from:body"
          hx-on:click="activateLyricsGroupingButton('album-groups');"
          hx-on:htmx:after-request="if (event.detail.xhr.getResponseHeader('HX-Trigger')?.includes('activateAlbumGroupingLyrics')) { activateLyricsGroupingButton('album-groups'); }"
          class="view-toggle-btn inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-700 hover:text-gray-800 dark:hover:text-gray-200"
          title="Group by Album">
          <i class="fas fa-compact-disc text-xs"></i>
        </button>
     </div>
  </div>
</div>
