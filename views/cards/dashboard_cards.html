<div class="grid grid-cols-3 gap-3 mb-6" id="dashboard-cards">
  <div class="bg-white/80 dark:bg-gray-900/70 p-3 sm:p-4 md:p-5 rounded-xl shadow-lg backdrop-blur-sm border border-gray-200/50 dark:border-gray-800/70 transition-all hover:scale-[1.02] hover:shadow-md">
    <div class="flex items-center gap-2 sm:gap-3">
      <div class="w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg md:rounded-xl flex items-center justify-center shadow-md">
        <i class="fa-solid fa-guitar text-sm sm:text-lg md:text-xl text-white"></i>
      </div>
      <div>
        <dt class="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide">Artists</dt>
        <dd class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">
          {{.ArtistsCount}}
        </dd>
      </div>
    </div>
  </div>

  <div class="bg-white/80 dark:bg-gray-900/70 p-3 sm:p-4 md:p-5 rounded-xl shadow-lg backdrop-blur-sm border border-gray-200/50 dark:border-gray-800/70 transition-all hover:scale-[1.02] hover:shadow-md">
    <div class="flex items-center gap-2 sm:gap-3">
      <div class="w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 bg-gradient-to-br from-purple-500 to-violet-600 rounded-lg md:rounded-xl flex items-center justify-center shadow-md">
        <i class="fa-solid fa-compact-disc text-sm sm:text-lg md:text-xl text-white"></i>
      </div>
      <div>
        <dt class="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide">Albums</dt>
        <dd class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">
          {{.AlbumsCount}}
        </dd>
      </div>
    </div>
  </div>

  <div class="bg-white/80 dark:bg-gray-900/70 p-3 sm:p-4 md:p-5 rounded-xl shadow-lg backdrop-blur-sm border border-gray-200/50 dark:border-gray-800/70 transition-all hover:scale-[1.02] hover:shadow-md">
    <div class="flex items-center gap-2 sm:gap-3">
      <div class="w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg md:rounded-xl flex items-center justify-center shadow-md">
        <i class="fa-solid fa-music text-sm sm:text-lg md:text-xl text-white"></i>
      </div>
      <div>
        <dt class="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide">Tracks</dt>
        <dd class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">
          {{.TracksCount}}
        </dd>
      </div>
    </div>
  </div>

</div>
