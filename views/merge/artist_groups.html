<div hx-swap-oob="beforeend:#toast-container">{{ template "toast/toastInfo" . }}</div>
{{ if .Groups }}
<div class="space-y-4">
    {{ range $i, $g := .Groups }}
    <form id="merge-artist-card-{{ $i }}" hx-post="/merge/artists" hx-swap="none"
          class="border border-gray-200/70 dark:border-gray-700/70 rounded-xl p-3 bg-white/40 dark:bg-gray-800/40">
        <input type="hidden" name="card_id" value="merge-artist-card-{{ $i }}">
        <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400">{{ len $g.Variants }} variants</span>
            <span class="text-[10px] uppercase tracking-wide text-gray-400">keep</span>
        </div>
        <div class="space-y-1.5">
            {{ range $g.Variants }}
            <label class="flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200 cursor-pointer">
                <input type="checkbox" name="members" value="{{ .ID }}" checked
                       class="rounded border-gray-300 dark:border-gray-600 text-purple-500 focus:ring-purple-500">
                <span class="flex-1 truncate" title="{{ .Value }}">{{ .Value }}</span>
                <input type="radio" name="canonical" value="{{ .ID }}" {{ if eq .Value $g.Canonical }}checked{{ end }}
                       class="text-purple-500 focus:ring-purple-500" title="Keep this name">
            </label>
            {{ end }}
        </div>
        <button type="submit"
                class="mt-3 w-full border border-purple-500 dark:border-purple-400 text-purple-600 dark:text-purple-300 hover:bg-purple-50 dark:hover:bg-purple-900/30 text-sm font-medium py-1.5 px-3 rounded-md transition-colors">
            Merge
        </button>
    </form>
    {{ end }}
</div>
{{ else }}
<p class="text-sm text-gray-500 dark:text-gray-400">No duplicate artists found 🎉</p>
{{ end }}
